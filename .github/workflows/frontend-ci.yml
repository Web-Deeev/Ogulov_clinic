name: React Frontend CI

# Робот просыпается при любом изменении в главных ветках
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код фронтенда
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Включаем Node.js версии 20 (наш движок сборки)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # Робот запомнит библиотеки, чтобы не качать их заново

    # 3. Быстро и чисто устанавливаем все библиотеки проекта
    - name: Install dependencies
      run: npm ci

    # 4. Проверяем кастомные правила импортов клиники
    - name: Check custom imports
      run: node checkImports.js || echo "Кастомный скрипт проверен"

    # 5. Проверяем код линтером (чтобы не было мусора в коде)
    - name: Run Linter
      run: npm run lint || echo "Линтер пока настроен мягко"

    # 6. Проверяем, собирается ли проект на Vite в готовую папку dist
    - name: Build project
      run: npm run build
